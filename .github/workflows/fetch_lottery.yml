name: Fetch Sake Lottery Info

on:
  schedule:
    - cron: '0 1,13 * * *'  # 毎日 10:00 JST / 22:00 JST
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-lottery.txt

      - name: Fetch lottery data
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: python scripts/fetch_lottery.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sake-lottery/data/lotteries.json
          git diff --cached --quiet || git commit -m "data: update sake lottery info [skip ci]"
          git push
